spring.application.name=mockworker

# MySQL
spring.datasource.url=jdbc:mysql://localhost:3306/mockworker?useSSL=false&allowPublicKeyRetrieval=true
spring.datasource.username=root
spring.datasource.password=root

# JPA
spring.jpa.hibernate.ddl-auto=update
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# Mock Worker
mockworker.base-url=https://dev.realteeth.ai
mockworker.poll-interval-ms=3000